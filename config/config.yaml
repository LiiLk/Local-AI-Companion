# Local AI Companion
# Tracked config = simple defaults.
# Put secrets and machine-specific overrides in config/config.local.yaml.

mode: "pipeline"  # "pipeline", "omni", "gemma-omni"

server:
  # Local-first default. Use config.local.yaml or --host 0.0.0.0 only when
  # intentionally exposing the companion on your LAN.
  host: "127.0.0.1"
  port: 8000
  cors:
    # null derives http://127.0.0.1:<port> and http://localhost:<port>.
    # Set an explicit list in config.local.yaml for custom frontend origins.
    allow_origins: null
    allow_credentials: false

pipeline:
  vad_required_misses: 20
  reply_language: "en"

memory:
  enabled: true
  history_path: "data/memory/conversation.jsonl"
  summary_path: "data/memory/summary.txt"
  max_recent_turns: 8
  max_message_chars: 2000
  max_summary_chars: 2000
  curate_enabled: true
  curator_timeout_sec: 20
  curator_max_input_chars: 1200
  curator_max_output_chars: 3000

audio:
  # Desktop backend behavior:
  # - bridge-only defaults to muted unless explicitly overridden here.
  # - allow_barge_in=false prevents the assistant's own playback from
  #   re-triggering VAD/ASR through speaker leakage.
  start_muted: false
  bridge_start_muted: true
  allow_barge_in: false
  # Extra grace period after a VAD segment ends before we commit the user turn.
  # This lets short pauses stay in the same utterance instead of triggering an
  # immediate response.
  speech_commit_delay_ms: 700
  vad_prob_threshold: 0.58
  vad_db_threshold: -47
  vad_required_hits: 4
  vad_required_misses: 20
  vad_min_speech_ms: 450
  vad_min_voiced_ms: 180

llm:
  # Stable choices for the normal pipeline:
  # - "ollama"     : local LLM
  # - "openrouter" : cloud LLM
  # - "gemma"      : advanced local multimodal path
  provider: "ollama"

  ollama:
    model: "qwen3.5:4b"
    base_url: "http://localhost:11434"
    think: false
    request_timeout_sec: 180
    preload_timeout_sec: 120
    turn_timeout_sec: 210
    options:
      temperature: 0.6
      top_p: 0.9
      top_k: 40
      presence_penalty: 0.1

  openrouter:
    model: "x-ai/grok-4.1-fast"
    api_key: null  # keep null here; use env or config.local.yaml
    api_key_env: "OPENROUTER_API_KEY"
    base_url: "https://openrouter.ai/api/v1"
    app_url: null
    app_title: "Local-AI-Companion"
    required_input_modalities: []
    request_timeout_sec: 180
    preload_timeout_sec: 60
    options:
      temperature: 0.6
      top_p: 0.9
      max_completion_tokens: 96
      reasoning:
        effort: "none"

character:
  preset: "march7th"

tts:
  # Stable choices:
  # - "kokoro" : best local realtime path, especially with RVC enabled
  # - "qwen3"  : best local premium voice path
  # - "chatterbox" / "edge" : optional fallbacks
  provider: "kokoro"
  stream_tts: true
  warmup_on_start: true
  auto_detect_language: true
  kokoro_voice: "ff_siwis"
  voice: "en-US-JennyNeural"
  rate: "+0%"
  pitch: "+0Hz"

  qwen3:
    model_id: "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
    mode: "voice_clone"
    language: "auto"
    speaker: null
    instruct: ""
    ref_audio_path: "resources/voices/march7th/VO_Archive_March_7th_5.wav"
    ref_text: null
    x_vector_only_mode: true
    device: "cuda:0"
    dtype: "bfloat16"
    attn_implementation: "sdpa"
    backend: "worker"
    python_path: ".\\.venv-qwen3-tts\\Scripts\\python.exe"
    site_packages_dir: null
    worker_script: ".\\scripts\\qwen3_tts_worker.py"
    request_timeout_sec: 20

  routed:
    preload_fallbacks: true
    warmup_fallbacks: true
    provider_order_by_language:
      fr: ["chatterbox", "qwen3", "kokoro"]
      en: ["qwen3", "chatterbox", "kokoro"]

  chatterbox:
    model_id: "onnx-community/chatterbox-multilingual-ONNX"
    cfg_weight: 0.5
    prefer_full_gpu: true

  rvc:
    enabled: true
    backend: "worker"
    python_path: ".\\venv\\Scripts\\python.exe"
    site_packages_dir: ".\\.rvc-overlay"
    worker_script: ".\\scripts\\rvc_worker.py"
    model_path: "resources/voices/march7th/March-7th.pth"
    index_path: "resources/voices/march7th/March-7th.index"
    device: "cuda:0"
    f0_method: "rmvpe"
    f0_up_key: 0.0
    index_rate: 0.0
    protect: 0.33
    output_freq: null

asr:
  # Stable choices:
  # - "whisper" : best default
  # - "qwen3"   : advanced local quality path
  provider: "whisper"
  model_size: "small"
  language: "auto"
  prompt: null
  beam_size: 3
  compute_type: "float16"
  device: "cuda"

  qwen3:
    model_id: "Qwen/Qwen3-ASR-0.6B"
    device: "cuda:0"
    dtype: "bfloat16"
    max_new_tokens: 256
    backend: "worker"
    python_path: ".\\.venv-qwen3-asr-worker\\Scripts\\python.exe"
    site_packages_dir: null
    worker_script: ".\\scripts\\qwen3_asr_worker.py"

# Advanced local multimodal paths.
# Leave these alone unless you explicitly switch mode or llm.provider.
omni:
  provider: "minicpmo"
  minicpmo:
    model_id: "openbmb/MiniCPM-o-4_5"
    quantization: "int4"
    device: "cuda"
    dtype: "bfloat16"
    attn_implementation: "sdpa"
    init_vision: false
    init_audio: true
    init_tts: true
    use_single_pass: true
    transcribe_for_history: false
    generate_audio: true
    stream_tts: false
    max_tokens: 512
    temperature: 0.7
    ref_audio_path: null
    speech_languages: ["en", "zh"]

gemma:
  model_id: "google/gemma-4-E2B-it"
  quantization: "int4"
  device: "cuda"
  cpu_offload: true
  offload_dir: ".cache/hf-offload/gemma"
  dtype: "bfloat16"
  max_new_tokens: 64
  turn_timeout_sec: 75
  temperature: 0.3
  top_p: 0.9
  context_max_turns: 6
  vision:
    enabled: true
    token_budget: 140
    detail_token_budget: 1120
  vad_required_misses: 10
  screen:
    enabled: false
    interval: 2.0
    max_buffer: 30
    change_threshold: 0.05
    include_in_conversation: false
