# AI Assistant Configuration
# You can modify this file without touching the code!

# === MODE ===
# "pipeline"    : Classic ASR → LLM → TTS pipeline (separate models)
# "omni"        : Single omni model handles speech-to-speech (MiniCPM-o)
# "gemma-omni"  : Gemma E4B (ASR+LLM+Vision) + Chatterbox TTS (voice clone)
mode: "pipeline"

# === OMNI MODEL (speech-to-speech) ===
# Used when mode: "omni"
# MiniCPM-o handles audio input, language understanding, and audio output
# in a single model — no separate ASR/LLM/TTS needed.
omni:
  provider: "minicpmo"
  minicpmo:
    # Model identifier (Hugging Face)
    model_id: "openbmb/MiniCPM-o-4_5"
    # Quantization: "int4" (~11GB VRAM), "int8" (~15GB), null for full precision (~19GB)
    # Use "int4" if you have a 12GB GPU (e.g. RTX 3060/4070)
    quantization: "int4"
    # Device: "cuda" for GPU, "cpu" for CPU (GPU strongly recommended)
    device: "cuda"
    # Precision: "bfloat16" (recommended), "float16", "float32"
    dtype: "bfloat16"
    # Attention backend: "sdpa" or "flash_attention_2" (if flash-attn installed)
    attn_implementation: "sdpa"
    # Initialize sub-modules (disable vision if not needed to save memory/speed)
    init_vision: false  # Set to true only if using camera/screen capture
    init_audio: true
    init_tts: true
    # Omni behavior
    use_single_pass: true          # audio in -> text+audio out in one call
    transcribe_for_history: false  # extra ASR pass for UI/history
    generate_audio: true
    stream_tts: false              # avoid sentence-level TTS in omni mode
    # Maximum new tokens to generate (512-1024 for conversational responses)
    max_tokens: 512
    # Sampling parameters
    temperature: 0.7
    # Voice cloning: path to a 6-30s WAV reference file (or null for default voice)
    # The model will clone the speaker's voice from this audio
    ref_audio_path: null
    # Supported speech languages (EN + ZH only for audio I/O)
    speech_languages: ["en", "zh"]

# === GEMMA-OMNI (Gemma E4B + Chatterbox TTS) ===
# Used when mode: "pipeline"
# Gemma 4 E4B-it handles audio + vision + reasoning in a single model.
# Chatterbox Multilingual handles TTS with voice cloning and emotions.
gemma:
  model_id: "google/gemma-4-E4B-it"
  quantization: "int4"           # TorchAO int4 (~4.1 GB VRAM)
  device: "cuda"
  dtype: "bfloat16"
  max_new_tokens: 96
  turn_timeout_sec: 75
  temperature: 0.7
  top_p: 0.95
  context_max_turns: 10
  vision:
    enabled: true
    token_budget: 140            # Tokens per image (passive mode)
    detail_token_budget: 1120    # Tokens per image (detail mode)
  # VAD tuning (Silero VAD end-of-speech sensitivity)
  # Lower = faster response, higher = more tolerant of pauses
  # Default: 30 (~960ms), tuned here for snappier real-time replies (~320ms)
  vad_required_misses: 10
  screen:
    enabled: true
    interval: 2.0                # Seconds between captures
    max_buffer: 30               # Circular buffer size
    change_threshold: 0.05       # Pixel diff threshold
    include_in_conversation: false

# === LLM (Brain) ===
# Used when mode: "pipeline"
llm:
  # Which LLM provider to use: "ollama" or "gemma"
  provider: "gemma"

  # Ollama configuration (kept as fallback)
  ollama:
    model: "llama3.2:3b"
    base_url: "http://localhost:11434"

# === Assistant Personality ===
# ─────────────────────────────────────────────────────────────────────────
# CHARACTER PRESETS
# ─────────────────────────────────────────────────────────────────────────
# The project is fully modular! You can switch characters by:
# 1. Using a preset: set character.preset to load from config/characters/
# 2. Custom config: set character.name and character.system_prompt directly
#
# Available presets (in config/characters/):
# - "march7th" : March 7th from Honkai: Star Rail (cheerful photographer)
# - "juri"     : Juri Han from Street Fighter (sarcastic villain)
# - "clippy"   : Microsoft Clippy (helpful paperclip)
#
# To add a new character:
# 1. Create config/characters/yourcharacter.yaml
# 2. Add Live2D model to assets/models/yourcharacter/
# 3. Add voice reference to resources/voices/yourcharacter/
# 4. Set character.preset: "yourcharacter" below
# ─────────────────────────────────────────────────────────────────────────
character:
  # Use a preset (loads from config/characters/<preset>.yaml)
  # Set to null or remove to use custom config below
  preset: "march7th"

  # Custom config (used if preset is null)
  # name: "My Character"
  # system_prompt: |
  #   Your custom personality prompt here...

# === TTS (Voice) ===
# Used when mode: "pipeline" (omni mode handles TTS internally)
tts:
  # Default TTS provider:
  # - "kokoro"     : Kokoro 82M (local, natural, lightweight, no voice cloning)
  # - "edge"       : Edge TTS (Microsoft cloud, free)
  # - "chatterbox" : Chatterbox Multilingual (local, voice cloning, emotion tags)
  provider: "chatterbox"

  # ─────────────────────────────────────────────────────────────────────────
  # STREAMING TTS (sentence-by-sentence)
  # ─────────────────────────────────────────────────────────────────────────
  # When enabled, TTS starts synthesizing as soon as a sentence is complete,
  # without waiting for the full LLM response. This dramatically reduces
  # perceived latency.
  # - true: Synthesize sentence by sentence (faster perceived response)
  # - false: Wait for full response before TTS (simpler, more stable)
  # ─────────────────────────────────────────────────────────────────────────
  stream_tts: true

  # ─────────────────────────────────────────────────────────────────────────
  # AUTO LANGUAGE DETECTION
  # ─────────────────────────────────────────────────────────────────────────
  # When enabled, the TTS will automatically detect the language of the text
  # and use the appropriate voice configuration.
  # Works with: Kokoro (changes voice), Edge TTS (changes voice)
  # ─────────────────────────────────────────────────────────────────────────
  auto_detect_language: true

  # ─────────────────────────────────────────────────────────────────────────
  # VOICE MAPPING BY LANGUAGE
  # ─────────────────────────────────────────────────────────────────────────
  # Define which voice to use for each language.
  # Used when auto_detect_language is enabled.
  # ─────────────────────────────────────────────────────────────────────────
  voice_mapping:
    # Kokoro voices by language
    kokoro:
      fr: "ff_siwis"    # French female voice
      en: "af_heart"    # American female voice

    # Edge TTS voices by language
    edge:
      fr: "fr-FR-DeniseNeural"   # French female voice
      en: "en-US-JennyNeural"    # American female voice

  # ─────────────────────────────────────────────────────────────────────────
  # KOKORO TTS (100% local, lightweight, no voice cloning)
  # ─────────────────────────────────────────────────────────────────────────
  # - 82M params, ~300MB, natural quality
  # - Voices: ff_siwis (FR), af_heart (US), bf_emma (UK), jf_alpha (JP)
  # ─────────────────────────────────────────────────────────────────────────
  kokoro_voice: "ff_siwis"

  # ─────────────────────────────────────────────────────────────────────────
  # EDGE TTS (Microsoft cloud, fallback)
  # ─────────────────────────────────────────────────────────────────────────
  voice: "en-US-JennyNeural"
  # Other Edge voices:
  # - en-US-GuyNeural (American male)
  # - en-GB-SoniaNeural (British female)
  # - fr-FR-DeniseNeural (French female)
  # - ja-JP-NanamiNeural (Japanese female)

  # ─────────────────────────────────────────────────────────────────────────
  # CHATTERBOX TTS (local, voice cloning, emotion tags)
  # ─────────────────────────────────────────────────────────────────────────
  # - ONNX Q4 quantized (~2 GB VRAM)
  # - Voice cloning from 5-10s reference audio
  # - Emotion tags: [laugh], [chuckle], [cough], [sigh]
  # - 23 languages including French
  # ─────────────────────────────────────────────────────────────────────────
  chatterbox:
    model_id: "onnx-community/chatterbox-multilingual-ONNX"
    quantized: true
    exaggeration: 0.5      # Emotion intensity (0.0 = flat, 1.0 = dramatic)
    cfg_weight: 0.5        # Classifier-free guidance weight
    prefer_full_gpu: false # Keep Chatterbox hybrid to avoid VRAM contention with Gemma

  rate: "+0%"    # Edge TTS speed (-50% to +100%)
  pitch: "+0Hz"  # Edge TTS pitch (-50Hz to +50Hz)

# === ASR (Speech Recognition) ===
# Used when mode: "pipeline" (omni mode handles ASR internally)
asr:
  # Available ASR providers:
  # - "whisper"  : Local, CPU/GPU compatible, good for many languages with distilled models
  provider: "whisper"

  # Available Whisper models:
  # ─────────────────────────────────────────────────────────────────────────
  # STANDARD MODELS (auto-download from OpenAI):
  # - tiny   : 39M params, very fast, low quality
  # - base   : 74M params, fast, medium quality
  # - small  : 244M params, GOOD COMPROMISE! Lightweight + good quality
  # - medium : 769M params, slow, very good quality
  # - large-v3: 1.5B params, very slow, best quality
  # - turbo  : 809M params, 6x faster than large-v3 (but sometimes hallucinates)
  # - distil-large-v3: 756M params, fast but ENGLISH ONLY
  # ─────────────────────────────────────────────────────────────────────────
  # FRENCH-OPTIMIZED MODELS (downloaded to models/, gitignored):
  # - french-distil-dec4 : 0.8B params, Excellent FR quality, ~500MB download
  # - french-distil-dec2 : 0.8B params, Faster, very good FR quality
  # These models are fine-tuned on 2500+ hours of French by bofenghuang.
  # WER: 8.37% (much better than standard Whisper for French)
  # ─────────────────────────────────────────────────────────────────────────
  model_size: "large-v3-turbo"

  # Language: "fr", "en", "auto" or empty "" for auto-detection
  language: "auto"

  # Prompt to guide transcription (helps even with forced language)
  # Provides context about the expected conversation style.
  prompt: "Transcription of a conversation with an AI assistant."

  # Device: "cpu" or "cuda" (GPU)
  # With other models on GPU, use "cpu" for Whisper to avoid OOM
  # Whisper small on CPU is fast enough (~1-2s per phrase)
  device: "cpu"

# === Live2D Avatar ===
live2d:
  # Enable/disable Live2D overlay
  enabled: false

  # Model configuration
  model:
    # Path relative to project root
    path: "assets/models/march7th/"
    # Model settings file name
    settings_file: "march 7th.model3.json"

  # Window settings
  window:
    width: 400
    height: 600
    # Position: -1 = auto (bottom-right corner)
    x: -1
    y: -1
    opacity: 0.95
    frameless: true
    on_top: true
    transparent: true

  # Expression mapping from emotions to model expressions
  # Format: emotion_name: "expression_name"
  default_expression: "happy"
  expressions:
    happy: "星星"        # Stars
    excited: "比耶"      # Peace sign
    sad: "哭"           # Cry
    angry: "黑脸"        # Dark face
    shy: "脸红"          # Blush
    embarrassed: "流汗"   # Sweat
    surprised: "比耶"
    photo: "照相"        # Camera
    facepalm: "捂脸"     # Face cover

  # Lip-sync settings
  lip_sync:
    # Smoothing factor (0.0 = instant, 1.0 = very smooth)
    smoothing: 0.3
    # Sensitivity multiplier
    sensitivity: 1.0

  # Hotkeys
  hotkeys:
    toggle_visibility: "F12"
    toggle_frameless: "F11"
